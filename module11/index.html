<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:linear-gradient(135deg,#e8f0e3,#d7e6f0);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;color:#2a3b2e}
  h1{font-size:clamp(20px,4vw,30px);color:#3d5a45;margin-bottom:4px;letter-spacing:.5px}
  .sub{font-size:14px;color:#6b7d70;margin-bottom:14px}
  .stage{position:relative;width:min(92vw,540px)}
  .viewport{position:relative;overflow:hidden;border-radius:22px}
  .track{display:flex;transition:transform .38s cubic-bezier(.4,.1,.2,1)}
  .card{min-width:100%;background:#fff;border-radius:22px;box-shadow:0 10px 30px rgba(60,90,69,.18);padding:26px 22px 20px;display:flex;flex-direction:column;align-items:center}
  .imgwrap{width:100%;height:340px;display:flex;align-items:center;justify-content:center}
  .imgwrap img{max-width:100%;max-height:100%;object-fit:contain}
  .word{margin-top:14px;font-size:34px;font-weight:700;color:#2f4636;text-transform:lowercase;letter-spacing:1px}
  .wordsHidden .word{visibility:hidden}
  .nav{position:absolute;top:50%;transform:translateY(-50%);width:52px;height:52px;border:none;border-radius:50%;background:rgba(255,255,255,.9);box-shadow:0 4px 14px rgba(0,0,0,.16);font-size:26px;color:#3d5a45;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
  .nav:hover{background:#fff;transform:translateY(-50%) scale(1.07)}
  .prev{left:-8px} .next{right:-8px}
  .bar{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:16px}
  .dots{display:flex;gap:8px}
  .dot{width:11px;height:11px;border-radius:50%;border:none;background:#b7c9bb;cursor:pointer;padding:0;transition:.15s}
  .dot.active{background:#3d5a45;transform:scale(1.25)}
  .counter{font-size:15px;font-weight:600;color:#4d6353;min-width:44px;text-align:center}
  .toggle{margin-top:18px;border:none;background:#3d5a45;color:#fff;font-size:16px;font-weight:600;padding:12px 22px;border-radius:30px;cursor:pointer;box-shadow:0 6px 16px rgba(61,90,69,.3);transition:.15s}
  .toggle:hover{background:#33503b;transform:translateY(-1px)}
  @media(max-width:480px){.imgwrap{height:250px}.word{font-size:28px}}
</style>

<script>
  var track=document.getElementById('track'),dots=[].slice.call(document.querySelectorAll('.dot'));
  var counter=document.getElementById('counter'),toggle=document.getElementById('toggle'),body=document.body;
  var n=9,i=0,hidden=false;
  function go(k){i=(k+n)%n;track.style.transform='translateX(-'+(i*100)+'%)';
    counter.textContent=(i+1)+' / '+n;
    dots.forEach(function(d,j){d.classList.toggle('active',j===i)});}
  document.getElementById('prev').onclick=function(){go(i-1)};
  document.getElementById('next').onclick=function(){go(i+1)};
  dots.forEach(function(d){d.onclick=function(){go(+d.dataset.i)}});
  document.addEventListener('keydown',function(e){if(e.key==='ArrowLeft')go(i-1);if(e.key==='ArrowRight')go(i+1);});
  toggle.onclick=function(){hidden=!hidden;body.classList.toggle('wordsHidden',hidden);
    toggle.textContent=hidden?'👁️ Afficher les mots':'🙈 Masquer les mots';};
  go(0);
</script>
