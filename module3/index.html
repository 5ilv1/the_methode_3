<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module 3 – At the airport – Flashcards</title>
<style>
  :root{--accent:#3f6fb5;--accent2:#7a5cc0;--bg1:#eef3fb;--bg2:#f7f0fb;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',system-ui,Arial,sans-serif;
    background:linear-gradient(135deg,var(--bg1),var(--bg2));min-height:100vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;color:#233;}
  h1{font-size:clamp(18px,3.2vw,26px);color:var(--accent);margin-bottom:2px;text-align:center;letter-spacing:.3px;}
  .sub{color:#6a6f7a;font-size:14px;margin-bottom:14px;text-align:center;}
  .stage{display:flex;align-items:center;gap:10px;}
  .card{background:#fff;border-radius:22px;box-shadow:0 10px 30px rgba(40,60,100,.16);
    width:min(78vw,420px);padding:22px 22px 16px;text-align:center;position:relative;}
  .imgwrap{width:100%;height:min(56vh,380px);display:flex;align-items:center;justify-content:center;
    background:#fff;border-radius:14px;overflow:hidden;}
  .imgwrap img{max-width:100%;max-height:100%;object-fit:contain;}
  .word{margin-top:12px;font-size:clamp(22px,4.6vw,34px);font-weight:700;color:var(--accent2);
    min-height:1.3em;letter-spacing:.5px;transition:opacity .15s;}
  .word.hidden{opacity:0;}
  .nav{background:var(--accent);color:#fff;border:none;width:52px;height:52px;border-radius:50%;
    font-size:26px;cursor:pointer;box-shadow:0 6px 16px rgba(63,111,181,.4);flex:none;
    display:flex;align-items:center;justify-content:center;transition:transform .1s,background .2s;}
  .nav:hover{background:#345c96;} .nav:active{transform:scale(.92);}
  .bottom{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:16px;}
  .dots{display:flex;gap:8px;}
  .dot{width:11px;height:11px;border-radius:50%;background:#c7d2e6;cursor:pointer;transition:.2s;}
  .dot.active{background:var(--accent);transform:scale(1.25);}
  .counter{font-size:14px;color:#6a6f7a;font-weight:600;}
  .toggle{background:var(--accent2);color:#fff;border:none;padding:11px 20px;border-radius:30px;
    font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 5px 14px rgba(122,92,192,.35);transition:.15s;}
  .toggle:hover{filter:brightness(1.07);} .toggle:active{transform:scale(.96);}
  .hint{font-size:12px;color:#9aa0ab;margin-top:2px;}
</style>
</head>

  let i=0, wordsHidden=false;
  const img=document.getElementById('cardImg'), word=document.getElementById('cardWord'),
        counter=document.getElementById('counter'), dotsBox=document.getElementById('dots'),
        toggle=document.getElementById('toggle');
  CARDS.forEach((c,idx)=>{const d=document.createElement('div');d.className='dot';
    d.onclick=()=>{i=idx;render();};dotsBox.appendChild(d);});
  const dots=[...dotsBox.children];
  function render(){
    const c=CARDS[i];
    img.src=c.img; img.alt=c.name;
    word.textContent=c.name;
    word.classList.toggle('hidden',wordsHidden);
    counter.textContent=(i+1)+' / '+CARDS.length;
    dots.forEach((d,idx)=>d.classList.toggle('active',idx===i));
  }
  document.getElementById('prev').onclick=()=>{i=(i-1+CARDS.length)%CARDS.length;render();};
  document.getElementById('next').onclick=()=>{i=(i+1)%CARDS.length;render();};
  toggle.onclick=()=>{wordsHidden=!wordsHidden;
    toggle.innerHTML=wordsHidden?'&#128065;&#65039; Afficher les mots':'&#128584; Masquer les mots';
    render();};
  document.addEventListener('keydown',e=>{
    if(e.key==='ArrowLeft')document.getElementById('prev').click();
    if(e.key==='ArrowRight')document.getElementById('next').click();});
  render();
</script>
