let i=0,show=true;
const img=document.getElementById('cimg'),word=document.getElementById('cword'),
count=document.getElementById('ccount'),dots=document.getElementById('dots'),
toggle=document.getElementById('toggle');
CARDS.forEach((c,k)=>{const d=document.createElement('div');d.className='dot';d.onclick=()=>{i=k;render();};dots.appendChild(d);});
function render(){
  const c=CARDS[i];img.src=c.img;word.innerHTML=c.w;
  word.className='word'+(show?'':' hidden');
  count.textContent=(i+1)+' / '+CARDS.length;
  [...dots.children].forEach((d,k)=>d.classList.toggle('active',k===i));
}
document.getElementById('prev').onclick=()=>{i=(i-1+CARDS.length)%CARDS.length;render();};
document.getElementById('next').onclick=()=>{i=(i+1)%CARDS.length;render();};
toggle.onclick=()=>{show=!show;toggle.textContent=show?'🙈 Masquer les mots':'👁️ Afficher les mots';render();};
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')document.getElementById('prev').click();if(e.key==='ArrowRight')document.getElementById('next').click();});
render();
</script></body></html>
