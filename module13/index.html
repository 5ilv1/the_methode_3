<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Happy New Year — This is my family — Flashcards</title>
<style>
  :root{--accent:#2f7dc4;--bg:#f4f8fc;--ink:#173049;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Trebuchet MS",Verdana,sans-serif;background:var(--bg);color:var(--ink);
        display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:18px;}
  h1{font-size:1.35rem;margin:.2em 0 .1em;text-align:center;color:var(--accent);}
  .sub{margin:0 0 14px;font-size:.95rem;color:#5b6b7a;text-align:center;}
  .card{position:relative;width:min(92vw,540px);background:#fff;border:3px solid var(--accent);
         border-radius:22px;box-shadow:0 8px 26px rgba(20,60,100,.16);padding:18px 16px 20px;}
  .stage{position:relative;height:min(56vh,430px);}
  .slide{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
  .slide.active{display:flex;}
  .imgwrap{flex:1;display:flex;align-items:center;justify-content:center;width:100%;min-height:0;}
  .imgwrap img{max-height:100%;max-width:90%;object-fit:contain;filter:drop-shadow(0 3px 6px rgba(0,0,0,.12));}
  .word{text-align:center;line-height:1.1;}
  .word .main{display:block;font-size:2.1rem;font-weight:700;color:var(--ink);letter-spacing:.5px;}
  .word .alt{display:block;font-size:1.05rem;color:#7a8a99;font-style:italic;margin-top:2px;}
  .hidewords .word{visibility:hidden;}
  .nav{position:absolute;top:50%;transform:translateY(-50%);border:none;background:var(--accent);
        color:#fff;width:46px;height:46px;border-radius:50%;font-size:1.7rem;line-height:1;cursor:pointer;
        display:flex;align-items:center;justify-content:center;box-shadow:0 3px 8px rgba(0,0,0,.2);}
  .nav:hover{background:#245f96;}
  .prev{left:-14px;} .next{right:-14px;}
  .bar{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:14px;flex-wrap:wrap;}
  .counter{font-weight:700;font-size:1rem;min-width:58px;text-align:center;}
  .dots{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;max-width:280px;}
  .dot{width:12px;height:12px;border-radius:50%;border:none;background:#c4d6e6;cursor:pointer;padding:0;}
  .dot.on{background:var(--accent);transform:scale(1.2);}
  .toggle{margin-top:14px;border:2px solid var(--accent);background:#fff;color:var(--accent);
           font-weight:700;font-size:1rem;padding:10px 18px;border-radius:30px;cursor:pointer;}
  .toggle:hover{background:var(--accent);color:#fff;}
  footer{margin-top:14px;font-size:.75rem;color:#9aa8b5;text-align:center;}
</style>
</head>

<script>
  const slides=[...document.querySelectorAll('.slide')];
  const dots=[...document.querySelectorAll('.dot')];
  const counter=document.getElementById('counter');
  const card=document.getElementById('card');
  let i=0;const n=slides.length;
  function show(k){
    i=(k+n)%n;
    slides.forEach((s,j)=>s.classList.toggle('active',j===i));
    dots.forEach((d,j)=>d.classList.toggle('on',j===i));
    counter.textContent=(i+1)+' / '+n;
  }
  document.getElementById('prev').onclick=()=>show(i-1);
  document.getElementById('next').onclick=()=>show(i+1);
  dots.forEach(d=>d.onclick=()=>show(+d.dataset.i));
  document.getElementById('toggle').onclick=function(){
    card.classList.toggle('hidewords');
    const h=card.classList.contains('hidewords');
    this.textContent=h?'👁️ Afficher les mots':'🙈 Masquer les mots';
  };
  document.addEventListener('keydown',e=>{
    if(e.key==='ArrowLeft')show(i-1);
    if(e.key==='ArrowRight')show(i+1);
  });
</script>
