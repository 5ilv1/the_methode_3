let i=0, wordsHidden=false;
const card=document.getElementById('card'),word=document.getElementById('word'),
cur=document.getElementById('cur'),tot=document.getElementById('tot'),
dots=document.getElementById('dots'),toggle=document.getElementById('toggle');
tot.textContent=DATA.length;
DATA.forEach((_,k)=>{const d=document.createElement('div');d.className='dot';d.onclick=()=>go(k);dots.appendChild(d);});
function render(){card.src=DATA[i].img;word.textContent=DATA[i].word;
word.classList.toggle('hidden',wordsHidden);cur.textContent=i+1;
[...dots.children].forEach((d,k)=>d.classList.toggle('active',k===i));}
function go(k){i=(k+DATA.length)%DATA.length;render();}

document.getElementById('prev').onclick=()=>go(i-1);

toggle.textContent=wordsHidden?'👁️ Afficher les mots':'🙈 Masquer les mots';render();};
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')go(i+1);
if(e.key==='ArrowLeft')go(i-1);if(e.key===' '){e.preventDefault();toggle.click();}});
render();
