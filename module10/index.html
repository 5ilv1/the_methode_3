  function go(i){idx=(i+n)%n;track.style.transform='translateX('+(-idx*100)+'%)';counter.textContent=(idx+1)+' / '+n;dots.forEach((d,k)=>d.classList.toggle('active',k===idx));}
  document.getElementById('prev').onclick=()=>go(idx-1);
  document.getElementById('next').onclick=()=>go(idx+1);
  dots.forEach(d=>d.onclick=()=>go(+d.dataset.i));
  const toggle=document.getElementById('toggle');
  toggle.onclick=()=>{document.body.classList.toggle('hidden-words');const h=document.body.classList.contains('hidden-words');toggle.textContent=h?'👁️ Afficher les mots':'🙈 Masquer les mots';};
  document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')go(idx+1);if(e.key==='ArrowLeft')go(idx-1);});
  go(0);
</script>
</body>
</html>
