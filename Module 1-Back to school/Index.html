*{box-sizing:border-box;margin:0;padding:0}

.count{margin-top:8px;font-size:13px;color:#6b6b78}

<script>
var i=0;var slides=document.getElementById('slides');var n=slides.children.length;
var dots=document.getElementById('dots');var count=document.getElementById('count');
for(var k=0;k<n;k++){var d=document.createElement('div');d.className='dot'+(k===0?' on':'');d.dataset.k=k;dots.appendChild(d);}
function go(x){i=(x+n)%n;slides.style.transform='translateX(-'+(i*100)+'%)';
var ds=dots.children;for(var k=0;k<n;k++)ds[k].className='dot'+(k===i?' on':'');
count.textContent=(i+1)+' / '+n;}
document.getElementById('prev').onclick=function(){go(i-1)};
document.getElementById('next').onclick=function(){go(i+1)};
dots.onclick=function(e){if(e.target.dataset.k!==undefined)go(+e.target.dataset.k)};
document.addEventListener('keydown',function(e){if(e.key==='ArrowLeft')go(i-1);if(e.key==='ArrowRight')go(i+1);});
var tw=document.getElementById('toggleWords');
tw.onclick=function(){var h=document.body.classList.toggle('hide-words');tw.textContent=h?'👁️ Afficher les mots':'🙈 Masquer les mots';};
go(0);
