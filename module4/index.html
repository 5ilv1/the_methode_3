<title>The train to London — Directions flashcards</title>
<style>
  :root { --accent:#3a5fa8; --ink:#22262b; --soft:#eef2f9; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(circle at 50% 0%,#f7f9fd,#e7edf7);
    color:var(--ink); display:flex; align-items:center; justify-content:center;
    min-height:100%; padding:16px;
  }
  .card {
    width:min(560px,94vw); background:#fff; border-radius:22px;
    box-shadow:0 18px 44px rgba(30,54,102,.18); padding:22px 22px 18px;
  }
  .head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:8px; }
  .head h1 { font-size:1.02rem; margin:0; color:var(--accent); letter-spacing:.2px; }
  .flag { font-size:1.3rem; }
  .stage { position:relative; }
  .slide { display:none; text-align:center; }
  .slide.active { display:block; animation:fade .25s ease; }
  @keyframes fade { from {opacity:.0; transform:translateY(4px);} to {opacity:1; transform:none;} }
  .imgwrap {
    background:var(--soft); border-radius:18px; height:min(52vh,340px);
    display:flex; align-items:center; justify-content:center; padding:18px;
  }
  .imgwrap img { max-width:88%; max-height:100%; object-fit:contain; }
  .word {
    margin:14px 4px 2px; font-size:1.6rem; font-weight:700; color:var(--ink);
    min-height:2rem; transition:opacity .18s;
  }
  body.hidden .word { opacity:0; }
  .nav { display:flex; align-items:center; justify-content:space-between; margin-top:6px; }
  .arrow {
    border:none; background:var(--accent); color:#fff; width:52px; height:52px;
    border-radius:50%; font-size:1.5rem; cursor:pointer; line-height:1;
    box-shadow:0 6px 14px rgba(58,95,168,.35); transition:transform .1s, background .2s;
  }
  .arrow:hover { background:#2f4f8f; }
  .arrow:active { transform:scale(.92); }
  .counter { font-weight:700; color:var(--accent); font-variant-numeric:tabular-nums; }
  .dots { display:flex; gap:8px; justify-content:center; margin:14px 0 6px; }
  .dot {
    width:11px; height:11px; border-radius:50%; border:none; padding:0;
    background:#c4d0e6; cursor:pointer; transition:transform .15s, background .2s;
  }
  .dot.active { background:var(--accent); transform:scale(1.25); }
  .toggle {
    display:block; margin:8px auto 0; border:none; cursor:pointer;
    background:var(--soft); color:var(--accent); font-weight:700; font-size:.98rem;
    padding:10px 18px; border-radius:999px;
  }
  .toggle:hover { background:#e2e9f6; }
</style>

<script>
  var slides=[].slice.call(document.querySelectorAll('.slide'));
  var dots=[].slice.call(document.querySelectorAll('.dot'));
  var cur=0, N=slides.length;
  function show(i){
    cur=(i+N)%N;
    slides.forEach(function(s,k){ s.classList.toggle('active',k===cur); });
    dots.forEach(function(d,k){ d.classList.toggle('active',k===cur); });
    document.getElementById('cur').textContent=cur+1;
  }
  document.getElementById('next').onclick=function(){ show(cur+1); };
  document.getElementById('prev').onclick=function(){ show(cur-1); };
  dots.forEach(function(d){ d.onclick=function(){ show(+d.dataset.i); }; });
  document.addEventListener('keydown',function(e){
    if(e.key==='ArrowRight') show(cur+1);
    if(e.key==='ArrowLeft') show(cur-1);
  });
  var tog=document.getElementById('toggle');
  tog.onclick=function(){
    var hidden=document.body.classList.toggle('hidden');
    tog.textContent=hidden ? '👁️ Afficher les mots' : '🙈 Masquer les mots';
  };
</script>
